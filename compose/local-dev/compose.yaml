
services:

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://model-proxy:11434}
      ENABLE_OLLAMA_API: False
      ENABLE_OPENAI_API: True
    env_file:
      - .env
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui: